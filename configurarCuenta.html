<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>\!!configurar_cuenta.título!!\</title>
</head>
<body>
    <script src="./client.js"></script>
    <h1>\!!configurar_cuenta.notificaciones!!\</h1>
    <button onclick="subscribirseParaNotificaciones()">\!!configurar_cuenta.habilitar_notificaciones!!\</button>
    <button onclick="dessubscribirseParaNotificaciones()">\!!configurar_cuenta.deshabilitar_notificaciones!!\</button>
    
    <h1>\!!configurar_cuenta.foto_de_perfil!!\</h1>
    <img src="/app/fotoDePerfil?user=<!--UID-->" width="64px" height="64px" style="border-radius: 100%;">
    <form action="/establecerFotoDePerfil" method="post" enctype="multipart/form-data">
        <input type="file" name="pfp" id="pfp">
        <input type="submit" value="\!!configurar_cuenta.establecer_foto_de_perfil!!\">
    </form>
    <button onclick="makeRequest('/desestablecerFotoDePerfil', 'DELETE'); window.location.reload()">\!!configurar_cuenta.desestablecer_foto_de_perfil!!\</button>
    
    <div>
        <h1>\!!configurar_cuenta.usar_sso!!\</h1>
        <p style="color: darkred;">\!!configurar_cuenta.usar_sso.advertencia!!\</p>
        <button class="gsi-material-button" <!--GITHUB_SSO_DISABLED--> onclick="window.location.href = '/oauth/github/configure'">
            <div class="gsi-material-button-state"></div>
            <div class="gsi-material-button-content-wrapper">
                <div class="gsi-material-button-icon">
                    <img src="./assets/imgs/GitHub_Invertocat_Black.svg" width="200px">
                </div>
                <span class="gsi-material-button-contents">\!!configurar_cuenta.usar_sso.github!!\</span>
                <span style="display: none;">\!!configurar_cuenta.usar_sso.github!!\</span>
            </div>
        </button>
    </div>
</body>
</html>
